name: Daily Performance Audit

on:
  schedule:
    - cron: "0 6 * * *"   # runs every day at 6am UTC
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  audit:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push results back to repo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Collect metrics
        run: python scripts/collect_logs.py

      - name: Run governor
        run: python scripts/run.py

      - name: Commit results back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/performance_logs.csv data/performance_logs_history.csv data/performance_rules.json data/performance_rules.html data/alerts.json
          git diff --staged --quiet || git commit -m "chore: daily audit $(date +'%Y-%m-%d')"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report-${{ github.run_number }}
          path: |
            data/performance_logs.csv
            data/performance_rules.json
            data/performance_rules.html
